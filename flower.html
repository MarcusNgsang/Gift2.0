<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gift</title> 
        <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&amp;display=swap" rel="stylesheet">
        <style>
            
            /* General Reset */
            
            * {
                margin: 0; 
                padding: 0; 
                box-sizing: border-box; 
            } 
            body { 
                min-height: 100vh; 
                display: flex; 
                flex-direction: column; 
                align-items: center; 
                justify-content: center; 
                background: #000; 
                font-family: 'Segoe UI', sans-serif; 
                overflow: hidden; 
                position: relative; 
            } 
            
            /* Particle Effects */
            
            #particles { 
                position: fixed; 
                top: 0; 
                left: 0; 
                width: 100%; 
                height: 100%; 
                pointer-events: none; 
                z-index: 0; 
            } 
            .particle { 
                position: absolute; 
                width: 4px; 
                height: 4px; 
                background: rgba(255, 255, 255, 0.8); 
                border-radius: 50%; 
                animation: float 15s infinite ease-in-out; }
                
            @keyframes float {
                0% { 
                    transform: translateY(0) translateX(0); 
                    opacity: 0; }

                10% { 
                    opacity: 1; 
                }
                90% { 
                    opacity: 1; 
                } 
                100% { 
                    transform: translateY(-100vh) translateX(50px); 
                    opacity: 0; 
                }
             } 
            
            @keyframes fadeInPulse { 
                0% { 
                    opacity: 0; 
                    transform: scale(0.8); 
                } 
                50% { 
                    opacity: 1; 
                    transform: scale(1); 
                } 
                100% { 
                    opacity: 1; 
                    transform: scale(1); 
                } 
            } 
            
            /* Main Container - holds the bouquet scene */
            
            .bouquet-scene { 
                position: relative; 
                width: 90%; 
                max-width: 360px; 
                height: 450px; 
                display: none; 
                align-items: flex-end; 
                justify-content: center; 
                margin-bottom: 30px; } 
                
            /* Vase - front visible part */
                
            .vase-front {
                position: absolute; 
                bottom: 30px; 
                width: 78%; 
                height: 120px; 
                background: linear-gradient(135deg, #87CEEB, #4682B4, #1E90FF); 
                clip-path: polygon(10% 0, 90% 0, 100% 100%, 0 100%); 
                transform: perspective(200px) rotateX(10deg); 
                z-index: 5; 
                left: 10.5%; 
                box-shadow: inset 0 -20px 30px rgba(255, 255, 255, 0.3), 0 0 20px rgba(30, 144, 255, 0.4); 
                    
                /* Vase Animation */
                    
                animation: vaseGlow 3s ease-in-out infinite; 
                transform-origin: bottom center; 
            } 
            @keyframes vaseGlow { 
                0%, 100% {
                    box-shadow: inset 0 -20px 30px rgba(255, 255, 255, 0.3), 0 0 20px rgba(30, 144, 255, 0.4);
                } 
                50% {
                    box-shadow: inset 0 -20px 30px rgba(255, 255, 255, 0.5), 0 0 40px rgba(30, 144, 255, 0.7); 
                }
            } 
                
            /* Vase Entrance Animation */
                
            @keyframes vaseEntrance { 
                0% { 
                    opacity: 0;
                    transform: translateY(50px) scale(0.8); 
                } 
                100% { 
                    opacity: 1; 
                    transform: translateY(0) scale(1); 
                }
            } 
            @keyframes vaseEntranceFlip { 
                0% { 
                    opacity: 0; 
                    transform: perspective(200px) rotateX(180deg) translateY(50px) scale(0.8); 
                } 
                100% { 
                    opacity: 1; 
                    transform: perspective(200px) rotateX(180deg) translateY(0) scale(1); 
                } 
            } 
            .vase-front.entrance { 
                animation: vaseEntrance 0.8s ease-out forwards, vaseGlow 3s ease-in-out infinite 0.8s; 
            } 
            .vase-front2.entrance { 
                animation: vaseEntranceFlip 0.8s ease-out forwards, vaseGlow 3s ease-in-out infinite 1s; 
                animation-delay: 0.2s; 
                opacity: 0; 
            } 
            .vase-back.entrance { 
                animation: vaseEntrance 0.8s ease-out forwards; 
                animation-delay: 0.1s; 
                opacity: 0; 
            } 
                
            /* Vase Shadow Entrance Animation */ 
                
            .vase-shadow { 
                position: absolute; 
                bottom: 20px; 
                width: 80%; 
                height: 20px; 
                left: 10%; 
                background: radial-gradient(ellipse, rgba(0, 0, 0, 0.2), transparent); 
                border-radius: 50%; 
                opacity: 0; 
                transform: scale(0.5); 
                transition: all 0.8s ease-out; 
            } 
            .vase-shadow.entrance { 
                opacity: 1; 
                transform: scale(1); 
            }
                
            /* Water ripple effect inside vase */
                
            .vase-front .water-ripple, .vase-back .water-ripple { 
                position: absolute; 
                top: 10%; 
                left: 10%; 
                width: 80%; 
                height: 30px; 
                overflow: hidden; 
                border-radius: 50%; 
            } 
            .vase-front .ripple-wave, .vase-back .ripple-wave { 
                position: absolute; 
                width: 200%; 
                height: 200%; 
                background: repeating-linear-gradient( transparent, transparent 10px, rgba(255, 255, 255, 0.15) 10px, rgba(255, 255, 255, 0.15) 12px ); 
                animation: rippleMove 3s linear infinite; 
            } 
            @keyframes rippleMove { 
                0% { 
                    transform: translateX(0) translateY(0); 
                } 
                100% { 
                    transform: translateX(-50%) translateY(-50%); 
                } 
            } 
                
            .vase-front2 { 
                position: absolute; 
                bottom: 24vh; 
                width: 90%; 
                height: 120px; 
                background: linear-gradient(135deg, #87CEEB, #4682B4, #1E90FF); 
                clip-path: polygon(10% 0, 90% 0, 100% 100%, 0 100%); 
                transform: perspective(200px) rotateX(180deg); 
                z-index: 5; 
                left: 5%; 
                box-shadow: inset 0 -20px 30px rgba(255, 255, 255, 0.3), 0 0 20px rgba(30, 144, 255, 0.4); 
            } 
                
            /* Vase - back part for depth */ 
                
            .vase-back { 
                position: absolute; 
                bottom: 90px; 
                width: 70%; 
                height: 100px; 
                background: linear-gradient(135deg, #1E90FF, #4169E1, #0000CD); 
                clip-path: polygon(15% 0, 85% 0, 100% 100%, 0 100%); 
                transform: translateZ(-20px); 
                z-index: 1; 
                left: 15%; 
                box-shadow: 0 10px 30px rgba(30, 144, 255, 0.5); 
            } 
                
            /* Blue decorative stripe on vase */ 
                
            .vase-front::after, 
            .vase-front2::after { 
                content: ''; 
                position: absolute; 
                top: 20%; 
                left: 5%; 
                width: 90%; 
                height: 8px; 
                background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent); 
                border-radius: 4px; 
            } 
                
            /* Blue decorative stripe 2 */ 
                
            .vase-front::before,
            .vase-front2::before { 
                content: ''; 
                position: absolute; 
                display: none; 
                top: 50%; 
                left: 5%; 
                width: 90%; 
                height: 15px; 
                background: linear-gradient(90deg, transparent, rgba(173, 216, 230, 0.4), transparent); 
                border-radius: 4px; 
            } 
                
            /* Greenery/Foliage Container */ 
                
            .greenery-container { 
                position: absolute; 
                bottom: 80px; 
                width: 100%; 
                display: flex; 
                justify-content: center;
                z-index: 3; 
            } 
                
            /* Tulip - complete flower unit */ 
                
            .tulip { 
                position: absolute; 
                bottom: 80px; 
                opacity: 0; 
                transform: translateY(100px) translateX(-15px) scale(0); 
                transition: all 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
                transform-origin: bottom center; 
                z-index: 2; 
                will-change: transform; 
            } 
                
            /* Tulip shown state */ 
                
            .tulip.shown { 
                opacity: 1; 
            } 
                
            /* Tulip Head - contains petals */
                
            .tulip-head { 
                width: 80px; 
                height: 85px; 
                position: relative;
                margin: 0 auto; 
                margin-bottom: -3px;
            } 
                    
            /* Petal - base petal style */ 
                    
            .petal { 
                position: absolute; 
                width: 40px; 
                height: 70px; 
                border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%; 
                transform-origin: bottom center; 
            } 
                    
            /* Petal positions */ 
                    
            .petal-back { 
                top: 5px; 
                left: 50%; 
                transform: translateX(-50%); 
                z-index: 1; 
                height: 65px; 
            } 
                    
            .petal-left { 
                top: 12px; 
                left: 2px; 
                transform: rotate(-25deg); 
                z-index: 2;
                height: 68px; 
            } 
            .petal-right { 
                top: 12px; 
                right: 2px; 
                transform: rotate(25deg); 
                z-index: 2; 
                height: 68px; 
            } 

            /* Stem - the stalk of tulip */
                        
            .tulip-stem { 
                width: 10px; 
                height: 100px; 
                background: linear-gradient(90deg, #2d5016, #4a7c23, #3d6b1f, #2d5016); 
                margin: 0 auto; 
                border-radius: 3px; 
                position: relative; 
                transform-origin: top center; 
            } 
            .tulip-stem::before { 
                content: ''; 
                position: absolute; 
                left: 2px; 
                top: 0; 
                width: 2px; 
                height: 100%; 
                background: linear-gradient(180deg, rgba(255, 255, 255, 0.3), transparent); 
                border-radius: 2px; 
            } 

            /* Stem leaves */
            .stem-leaf{
                position:absolute;
                width:25px;
                height:12px;
                background:linear-gradient(90deg,#4a7c23,#2d5016);
                border-radius:20px 0 20px 0;
            }

            .stem-leaf.left{
                left:-18px;
                top:35px;
                transform:rotate(-35deg);
            }

            .stem-leaf.right{
                right:-18px;
                top:50px;
                transform:rotate(35deg);
            }

            .stem-leaf.extra{
                left:-15px;
                top:65px;
                transform:rotate(-20deg);
            }

                box-shadow: inset 0 -15px 20px rgba(0, 0, 0, 0.15), 0 3px 8px rgba(0, 0, 0, 0.2);

            }

            .tulip:nth-child(1){ 
                left: calc(50% - 5vh); 
                bottom: 340px; } 
            .tulip:nth-child(1).shown{

/* Bow */
.bow { 
    width: 70px; 
    height: 60px; 
    position: relative; 
}

/* Bow loops */
.bow-loop { 
    position: absolute; 
    width: 55px; 
    height: 75px; 
    background: linear-gradient(135deg,#1E90FF,#4169E1,#0000CD); 
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; 
    box-shadow: 0 4px 12px rgba(30,144,255,0.5); 
}

.bow-loop.left { 
    left:-30px; 
    transform: rotate(-35deg); 
}

.bow-loop.right { 
    right:-30px; 
    transform: rotate(35deg) scaleX(-1); 
}

/* Center knot */
.bow-center { 
    position:absolute; 
    left:50%; 
    top:100%; 
    transform:translate(-50%,-50%); 
    width:40px; 
    height:40px; 
    background:linear-gradient(135deg,#4169E1,#0000CD); 
    border-radius:50%; 
    z-index:3; 
}

/* Ribbon tails */
.ribbon-tails{
    margin-top:3px;
    display:flex;
    gap:50px;
}

.ribbon-leg{
    width:30px;
    height:80px;
    background: linear-gradient(90deg,#1E90FF,#4169E1,#4169E1,#1E90FF);
    clip-path: polygon(0 0,100% 0,85% 100%,15% 100%);
    box-shadow:0 4px 12px rgba(30,144,255,0.4);
}

.ribbon-leg.left{
    transform: rotate(30deg);
}

            /* Click Button */ 
                
            .reveal-button { 
                padding: 18px 45px; 
                font-size: 1.3rem; 
                font-weight: bold; 
                color: #fff; 
                background: linear-gradient(135deg, #e74c3c, #c0392b);

                cursor: pointer;

                z-index: 10;

            } 
            .reveal-button:hover { 
                transform: translateY(-3px); 
                box-shadow: 0 12px 35px rgba(192, 57, 43, 0.5); 
            } 
            .reveal-button.clicked { 
                background: linear-gradient(135deg, #27ae60, #1e8449); 
                pointer-events: none;

            /* Sparkle effect */ 
                
            .sparkle { 
                position: absolute; 
                width: 8px; 
                height: 8px;
                background: radial-gradient(circle, #fff, #ffd700); 
                border-radius: 50%; 
                animation: sparkle 1s ease-out forwards; 
                pointer-events: none; 
                z-index: 20; 
            } 
            @keyframes sparkle { 
                    0% {
                        transform: scale(0); 
                        opacity: 1; 
                    } 
                    100% { 
                        transform: scale(2.5); 
                        opacity: 0; 
                    } 
            } 
                
            /* Arrow indicator */ 
                
            .arrow-indicator { 
                position: absolute; 
                margin-top: 15px; 
                z-index: 15; 
                left: 50vw; 
                bottom: 40vh; 
            }
            .arrow-indicator::before, 
            .arrow-indicator::after { 
                content: ''; 
                position: absolute; 
                width: 0; 
                height: 0; 
                border-left: 12px solid transparent; 
                border-right: 12px solid transparent; 
            } 
            .arrow-indicator::before { 
                top: -20px; 
                left: -12px; 
                border-bottom: 20px solid #c0392b; 
                animation: arrowBounce 1s ease-in-out infinite; 
            } 
            .arrow-indicator::after { 
                top: -8px; 
                left: -12px; 
                border-bottom: 20px solid #e74c3c; 
                animation: arrowBounce 1s ease-in-out infinite 0.1s; 
            } 
                @keyframes arrowBounce { 
                    0%, 100% { 
                        transform: translateY(0); 
                    } 
                    50% { 
                        transform: translateY(5px); 
                    } 
            } 
                
            /* Falling Petals */

                position: fixed; 
                width: 12px;

            @keyframes petalFall {

            <!-- Ribbon/Bow --> 
                
            <div class="ribbon-container"> 
                <div class="bow"> 
                    <div class="bow-loop left"></div> 
                    <div class="bow-loop right"></div>

            <div class="vase-back"> 
                <div class="water-ripple"> 
                    <div class="ripple-wave"></div>

            <div class="vase-front"> 
                <div class="water-ripple"> 
                    <div class="ripple-wave"></div>

        <button class="reveal-button" onclick="revealBouquet()">Click here</button> 
        <div class="arrow-indicator"></div> 
        <script> 
            const vaseBack = document.querySelector(".vase-back"); 
            const vaseFront = document.querySelector(".vase-front"); 
            const vaseFront2 = document.querySelector(".vase-front2"); 
            const bouquetScene = document.querySelector(".bouquet-scene"); 
            const vaseShadow = document.querySelector(".vase-shadow"); 
            const revealButton = document.querySelector(".reveal-button"); 
function revealBouquet() { 
                bouquetScene.style.display = 'flex'; 
                vaseFront.style.display = 'block'; 
                vaseBack.style.display = 'block'; 
                vaseFront2.style.display = 'block'; 
                vaseShadow.classList.add('entrance'); 
                revealButton.style.display = 'none';

                setTimeout(() => {
                    vaseFront.classList.add('entrance'); 
                    vaseBack.classList.add('entrance'); 
                    vaseFront2.classList.add('entrance'); 
                    const ribbonContainer = document.querySelector('.ribbon-container');
                    ribbonContainer.classList.add('entrance');
                }, 200);

                const loveMessage = document.querySelector('.love-message');

                document.querySelectorAll('.tulip').forEach((tulip, index) => { 
                    setTimeout(() => { 
                        tulip.classList.add('shown'); 
                        // Sparkles
                        for (let j = 0; j < 5; j++) { 
                            setTimeout(() => { 
                                const sparkle = document.createElement('div'); 
                                sparkle.className = 'sparkle'; 
                                sparkle.style.left = (Math.random() * 80) + '%'; 
                                sparkle.style.top = (Math.random() * 80) + '%'; 
                                const head = tulip.querySelector('.tulip-head');
                                if (head) head.appendChild(sparkle); 
                                setTimeout(() => { 
                                    if (sparkle.parentNode) sparkle.remove(); 
                                }, 1000); 
                            }, j * 100); 
                        } 
                    }, 500 + index * 150); 
                }); 

                // Love message animation after bouquet
                setTimeout(() => {
                    if (loveMessage) {
                        loveMessage.classList.add('show');
                    }
                }, 3000);

                document.querySelector('.arrow-indicator').style.display = 'none'; 

                // Fireflies
                for (let i = 0; i < 8; i++) { 
                    setTimeout(() => {
                        const firefly = document.createElement("div"); 
                        firefly.className = "firefly"; 
                        firefly.style.left = (Math.random() * 100) + "%"; 
                        firefly.style.top = (Math.random() * 50 + 20) + "%"; 
                        firefly.style.animationDuration = (4 + Math.random() * 4) + "s";
                        bouquetScene.appendChild(firefly); 
                    }, i * 300);
                } 
            } 
            
            // Falling petals generator 
            
            function createPetal() { 
                const petal = document.createElement("div"); 
                petal.className = "petal-fall"; 
                petal.style.left = Math.random() * 100 + "vw"; 
                petal.style.animationDuration = (5 + Math.random() * 5) + "s"; 
                document.body.appendChild(petal); setTimeout(() => { 
                    petal.remove(); 
                }, 9000); 
            } 
            
            // spawn petals continuously 
            
            setInterval(createPetal, 1200); 
        </script> 
    </body>
</html>
